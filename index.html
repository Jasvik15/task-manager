<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Task Manager</title>
  <script>
    // Get the current path without the /task-manager prefix
    var path = window.location.pathname;
    var redirectPath = path.replace('/task-manager', '');
    
    // Store the path in sessionStorage
    sessionStorage.setItem('redirectPath', redirectPath);
    
    // Redirect to index.html
    window.location.href = '/task-manager/index.html';
  </script>
</head>
<body>
  Redirecting...
</body>
</html>
